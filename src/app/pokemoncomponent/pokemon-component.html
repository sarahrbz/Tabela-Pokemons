<div class="container">
  <div class="display-4 text-center"> Pokemons </div>
  <table class="table">
  <thead>
    <tr>
      <th scope="col">ID</th>
      <th scope="col">Nome</th>
      <th scope="col">Altura</th>
      <th scope="col">Peso</th>
      <th scope="col">Imagem</th>
    </tr>
  </thead>
   <tbody>
    <tr *ngFor="let p of pokemonsPaginados()">
      <td>{{p.id}}</td>
      <td>{{p.name}}</td>
      <td>{{p.height}}</td>
      <td>{{p.weight}}</td>
      <td><img [src]="p.sprites.front_default" [alt]="p.name" width="100" height="100"></td>
    </tr>
   </tbody>
</table>

<nav class="mt-4">
  <ul class="pagination justify-content-center">

    <li class="page-item" [class.disabled]="paginaAtual() === 1">
      <button class="page-link" (click)="paginaAnterior()">
        Anterior
      </button>
    </li>

    <li class="page-item active">
      <span class="page-link">
        {{ paginaAtual() }}
      </span>
    </li>

    <li class="page-item">
      <button class="page-link" (click)="proximaPagina()">
        Próxima
      </button>
    </li>

  </ul>
</nav>

</div>
